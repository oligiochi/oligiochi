# Generates the contribution-graph snake animation embedded in README.md.
#
# How it works:
#   1. Platane/snk reads your public contribution graph and renders two SVGs
#      (light + dark) into ./dist.
#   2. crazy-max/ghaction-github-pages force-pushes ./dist to the "output"
#      branch of this repository.
#   3. README.md embeds the SVGs from that branch via raw.githubusercontent.com.
#
# Requirements (see SETUP.md for details):
#   - GitHub Actions enabled on this repository.
#   - No PAT needed: the built-in GITHUB_TOKEN with "contents: write" below is
#     enough, provided repository Settings → Actions → General → Workflow
#     permissions allow write access (or this per-workflow permissions block
#     is honored, which is the default).
#
# Customization:
#   - Palette: "github-dark" / "github-light" are built in. You can also pass
#     explicit colors, e.g. ?color_snake=%2358A6FF&color_dots=%23161B22,%230E4429,%23006D32,%2326A641,%2339D353
#   - Schedule: cron below runs once a day at 03:12 UTC. Off-hour minutes are
#     deliberate — GitHub often delays jobs scheduled exactly on the hour.

name: Generate contribution snake

on:
  schedule:
    - cron: "12 3 * * *"
  workflow_dispatch: # allows manual runs from the Actions tab (needed for the first run)
  push:
    branches:
      - main # regenerate when the profile itself changes

permissions:
  contents: write

concurrency:
  group: generate-snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Publish to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
